<div class="hero min-h-screen bg-base-200 relative overflow-hidden">
  <!-- Fondo degradado -->
  <div class="absolute inset-0 bg-linear-to-br from-base-200 via-base-100 to-base-200"></div>

  <!-- Blur decorativo -->
  <div class="absolute -top-30 -left-30 w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-35 -right-25 w-md h-112 bg-secondary/20 rounded-full blur-3xl"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-160 h-160 bg-info/10 rounded-full blur-3xl"></div>

  <!-- Mockup Instagram -->
  <div class="hidden lg:block absolute left-55 top-1/2 -translate-y-1/2 -rotate-12 opacity-70">
    <div class="w-72 rounded-4xl border border-base-300 bg-base-100/70 backdrop-blur-md shadow-2xl p-4">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-linear-to-tr from-pink-400 via-orange-300 to-yellow-200 p-0.5">
          <div class="w-full h-full rounded-full bg-base-100"></div>
        </div>
        <div class="text-left">
          <div class="h-3 w-24 rounded-full bg-base-300"></div>
          <div class="h-2 w-16 rounded-full bg-base-300 mt-2"></div>
        </div>
      </div>

      <div class="aspect-square rounded-2xl bg-linear-to-br from-pink-200 via-purple-200 to-orange-100"></div>

      <div class="mt-4 space-y-3">
        <div class="flex gap-3">
          <div class="w-5 h-5 rounded-full bg-base-300"></div>
          <div class="w-5 h-5 rounded-full bg-base-300"></div>
          <div class="w-5 h-5 rounded-full bg-base-300"></div>
        </div>
        <div class="h-3 w-full rounded-full bg-base-300"></div>
        <div class="h-3 w-4/5 rounded-full bg-base-300"></div>
      </div>
    </div>
  </div>

  <!-- Mockup Facebook -->
  <div class="hidden lg:block absolute right-55 top-1/2 -translate-y-1/2 rotate-10 opacity-70">
    <div class="w-80 rounded-4xl border border-base-300 bg-base-100/70 backdrop-blur-md shadow-2xl p-5">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-11 h-11 rounded-full bg-primary/30"></div>
        <div class="text-left flex-1">
          <div class="h-3 w-28 rounded-full bg-base-300"></div>
          <div class="h-2 w-20 rounded-full bg-base-300 mt-2"></div>
        </div>
      </div>

      <div class="space-y-3 mb-4">
        <div class="h-3 w-full rounded-full bg-base-300"></div>
        <div class="h-3 w-5/6 rounded-full bg-base-300"></div>
      </div>

      <div class="h-40 rounded-2xl bg-linear-to-br from-blue-100 to-indigo-200"></div>

      <div class="mt-4 flex justify-between">
        <div class="h-3 w-16 rounded-full bg-base-300"></div>
        <div class="h-3 w-20 rounded-full bg-base-300"></div>
      </div>
    </div>
  </div>

  <!-- Card principal -->
  <div class="hero-content text-center relative z-10 px-4 w-full">
    <div class="w-full max-w-3xl">
      <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight leading-[1.05] text-base-content max-w-4xl mx-auto">
        Diseña tus posts de
        <span class="bg-linear-to-r from-primary via-info to-secondary bg-clip-text text-transparent">
          Facebook e Instagram
        </span>
        antes de publicarlos
      </h1>

      <p class="mt-5 text-base md:text-lg leading-8 text-base-content/75 max-w-2xl mx-auto">
        Visualiza cómo quedará cada publicación, prueba estilos y decide el resultado final antes de compartirlo.
      </p>

      <div class="mt-10 flex flex-col sm:flex-row sm:justify-center gap-4">
        <button
          class="btn btn-primary btn-wide text-base shadow-lg shadow-primary/20 hover:scale-[1.03] transition-all duration-300"
          routerLink="./facebook-form">
          Facebook
        </button>

        <button
          class="btn btn-outline btn-wide text-base opacity-60"
          disabled>
          Instagram
        </button>
      </div>
    </div>
  </div>
</div>

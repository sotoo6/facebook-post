<div class="flex flex-col w-fit text-center my-4 mx-auto">
  <h1 class="inline-block text-2xl md:text-3xl font-bold text-slate-500 relative">
    Crea una publicación en Facebook
    <span class="block w-full h-1 mt-1.5 rounded-full bg-blue-300/70"></span>
  </h1>
  <small class="text-gray-500">Crea un nuevo post o selecciona uno existente para editarlo</small>
</div>
<section class="flex mt-10 justify-center gap-8 w-full">
  <facebook-form [postToEdit]="selectedPost" />
  <select-post (postSelected)="onPostSelected($event)" />
</section>

<div class="text-center my-6">
  <h1 class="inline-block text-2xl md:text-3xl font-bold text-slate-500 relative">
    Crea una publicación en Facebook
    <span class="block w-full h-1 mt-1.5 rounded-full bg-blue-300/70"></span>
  </h1>
</div>
<section class="flex justify-center gap-8 w-full">
  <facebook-form [postToEdit]="selectedPost"></facebook-form>
  <select-post (postSelected)="onPostSelected($event)"></select-post>
</section>

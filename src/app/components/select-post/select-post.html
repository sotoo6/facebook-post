<div class="bg-base-200 border-base-300 rounded-box w-full border px-8 py-5 shadow-lg h-[calc(100vh-150px)] mb-4 flex flex-col">
  <h2 class="inline-block mb-5 text-xl font-bold text-slate-500 relative">
    Selecciona un post para editar
  </h2>

  @if (savedPosts.length > 0) {
    <div class="flex flex-col flex-1 min-h-0 gap-4">

      <!-- Tarjeta de nuevo post (tamaño fijo, no crece) -->
      <div
        class="card bg-base-100 shadow-sm cursor-pointer hover:shadow-md transition-all shrink-0"
        (click)="selectNewPost()"
      >
        <div class="card-body">
          <h3 class="font-bold text-lg text-gray-700">Nuevo post</h3>
          <p class="text-sm text-gray-500">Pulsa aquí para limpiar el formulario</p>
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4 overflow-y-auto overflow-x-hidden pr-2 flex-1 min-h-0">
        @for (post of savedPosts; track $index) {
          <div class="min-w-0" (click)="selectPost(post)">
            <post-created
              [post]="post"
              (postDeleted)="onDeletePost($event)">
            </post-created>
          </div>
        }
      </div>
    </div>

  } @else {
    <div
      class="card bg-base-100 shadow-sm cursor-pointer hover:shadow-md transition-all"
      (click)="selectNewPost()"
    >
      <div class="card-body">
        <h3 class="font-bold text-lg text-gray-700">Nuevo post</h3>
        <p class="text-sm text-gray-500">Pulsa aquí para limpiar el formulario</p>
      </div>
    </div>
  }
</div>
